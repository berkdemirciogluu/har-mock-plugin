<!-- Boş durum mesajı — rules yokken göster (Subtask 2.1, AC #4) -->
@if (rules().length === 0) {
  <p class="py-4 text-center text-xs text-slate-400" data-testid="empty-state-message">
    Henüz rule tanımlanmadı. 'Yeni Rule Ekle' butonuyla başlayın.
  </p>
}

<!-- Liste — rules varken göster (Subtask 2.2, AC #1) -->
@if (rules().length > 0) {
  <ul class="mb-2 space-y-1" role="list" aria-label="Aktif rule listesi">
    @for (rule of rules(); track rule.id) {
      <li
        class="flex items-center gap-2 rounded border border-slate-200 bg-white px-2 py-1.5 text-xs"
        [attr.aria-label]="rule.urlPattern + ' kuralı'"
        data-testid="rule-item"
      >
        <!-- HTTP Method badge (Subtask 2.2) -->
        <span
          [class]="
            'shrink-0 rounded px-1.5 py-0.5 text-[10px] font-semibold uppercase ' +
            (rule.method | methodBadge)
          "
          data-testid="rule-method"
        >
          {{ rule.method }}
        </span>

        <!-- URL pattern — uzun pattern'larda truncate (Subtask 2.2) -->
        <span
          class="min-w-0 flex-1 overflow-hidden text-ellipsis whitespace-nowrap text-slate-700"
          [title]="rule.urlPattern"
          data-testid="rule-url-pattern"
        >
          {{ rule.urlPattern }}
        </span>

        <!-- Status code — renk kodlaması (Subtask 2.2) -->
        <span
          [class]="'shrink-0 font-medium ' + (rule.statusCode | statusColor)"
          data-testid="rule-status-code"
        >
          {{ rule.statusCode }}
        </span>

        <!-- Delay — sadece > 0 ise göster (Subtask 2.2) -->
        @if (rule.delay > 0) {
          <span class="shrink-0 text-slate-400" data-testid="rule-delay"> {{ rule.delay }}ms </span>
        }

        <!-- Düzenle butonu (Subtask 2.2, AC #2) -->
        <button
          type="button"
          [attr.aria-label]="rule.urlPattern + ' rule\'unu düzenle'"
          class="shrink-0 rounded p-1 text-slate-400 transition-colors hover:bg-slate-100 hover:text-indigo-600"
          data-testid="edit-rule-button"
          (click)="onEditClick(rule)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-3.5 w-3.5"
            viewBox="0 0 20 20"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"
            />
          </svg>
        </button>

        <!-- Sil butonu (Subtask 2.2, AC #3) -->
        <button
          type="button"
          [attr.aria-label]="rule.urlPattern + ' rule\'unu sil'"
          class="shrink-0 rounded p-1 text-slate-400 transition-colors hover:bg-slate-100 hover:text-red-600"
          data-testid="delete-rule-button"
          (click)="onDeleteClick(rule.id)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-3.5 w-3.5"
            viewBox="0 0 20 20"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              fill-rule="evenodd"
              d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
              clip-rule="evenodd"
            />
          </svg>
        </button>
      </li>
    }
  </ul>
}

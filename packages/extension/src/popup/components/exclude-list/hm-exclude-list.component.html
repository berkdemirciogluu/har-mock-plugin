<div class="space-y-2">
  <!-- Input row -->
  <div class="flex gap-2">
    <input
      type="text"
      class="flex-1 rounded border border-slate-300 px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500"
      [placeholder]="placeholder()"
      [attr.aria-label]="inputAriaLabel()"
      [value]="newPattern()"
      (input)="onNewPatternInput($event)"
      (keydown.enter)="addPattern()"
    />
    <button
      type="button"
      class="rounded bg-indigo-600 px-2 py-1 text-xs font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1"
      aria-label="Add — add to pattern list"
      (click)="addPattern()"
    >
      Add
    </button>
  </div>

  <!-- Validation message -->
  @if (validationError()) {
    <p class="text-xs text-red-600" role="alert">{{ errorMessage() }}</p>
  }

  <!-- Pattern list -->
  @if (excludeList().length > 0) {
    <ul role="list" class="space-y-1">
      @for (pattern of excludeList(); track pattern; let i = $index) {
        <li role="listitem" class="flex items-center justify-between rounded bg-slate-50 px-2 py-1">
          <span class="flex-1 truncate font-mono text-xs text-slate-700">{{ pattern }}</span>
          <button
            type="button"
            class="ml-2 shrink-0 text-xs text-red-500 hover:text-red-700 focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-offset-1"
            [attr.aria-label]="'Remove — ' + pattern"
            (click)="removePattern(i)"
          >
            Remove
          </button>
        </li>
      }
    </ul>
  } @else {
    <!-- Empty state -->
    <p class="text-xs text-slate-400 italic">
      {{ emptyMessage() }}
    </p>
  }
</div>
